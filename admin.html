<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | ЧИЛЛ.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-3xl font-black tracking-tighter uppercase">Управление ЧИЛЛ<span class="text-orange-600">.</span></h1>
            <a href="index.html" class="text-gray-500 hover:text-black font-bold">На сайт →</a>
        </header>

        <!-- Product Management -->
        <div class="bg-white rounded-3xl shadow-xl p-10 mb-8 border border-gray-100">
            <h2 class="text-xl font-bold mb-8 uppercase tracking-widest text-gray-400">Коллекция диванов</h2>
            <div id="sofaList" class="space-y-6">
                <!-- Sofa items will be rendered here -->
            </div>
            <button onclick="addSofa()" class="mt-10 w-full py-5 border-2 border-dashed border-gray-300 rounded-2xl text-gray-400 font-bold hover:border-orange-500 hover:text-orange-500 transition-colors">
                + Добавить новую модель
            </button>
        </div>

        <!-- Order / Chat Management (Placeholder for now) -->
        <div class="bg-[#1A1A1A] text-white rounded-3xl p-10 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 uppercase tracking-widest text-gray-500">Управление чатом</h2>
            <p class="text-gray-400 mb-6">Все диалоги с покупателями приходят в личный кабинет Help Scout Beacon.</p>
            <a href="https://secure.helpscout.net/" target="_blank" class="inline-block bg-orange-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-orange-500 transition-colors">
                Открыть панель чата
            </a>
        </div>
    </div>

    <script>
        // Simple mock data for demo
        let sofas = [
            { id: 1, name: "MILANO LUXE", price: 185000, image: "https://images.unsplash.com/photo-1540574163026-643ea20ade25?w=800&q=80" },
            { id: 2, name: "TORINO SOFT", price: 142000, image: "https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?w=800&q=80" }
        ];

        function renderSofas() {
            const list = document.getElementById('sofaList');
            list.innerHTML = sofas.map(s => `
                <div class="flex items-center gap-6 p-4 border border-gray-100 rounded-2xl bg-gray-50 hover:bg-white transition-all">
                    <img src="${s.image}" class="w-20 h-20 rounded-xl object-cover" />
                    <div class="flex-grow">
                        <input type="text" value="${s.name}" class="text-lg font-bold bg-transparent border-b border-transparent focus:border-orange-500 outline-none w-full" />
                        <input type="number" value="${s.price}" class="text-gray-500 font-medium bg-transparent border-b border-transparent focus:border-orange-500 outline-none w-full" />
                    </div>
                    <div class="flex gap-2">
                        <button onclick="saveSofa(${s.id})" class="p-3 bg-green-500 text-white rounded-xl hover:bg-green-600">✓</button>
                        <button onclick="deleteSofa(${s.id})" class="p-3 bg-red-100 text-red-600 rounded-xl hover:bg-red-200">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function saveSofa(id) {
            alert('Изменения сохранены! (В демо-режиме)');
        }

        function deleteSofa(id) {
            if(confirm('Удалить эту модель?')) {
                sofas = sofas.filter(s => s.id !== id);
                renderSofas();
            }
        }

        function addSofa() {
            const name = prompt('Название модели:');
            const price = prompt('Цена (в рублях):');
            if(name && price) {
                sofas.push({ id: Date.now(), name, price: parseInt(price), image: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400" });
                renderSofas();
            }
        }

        renderSofas();
    </script>
</body>
</html>
