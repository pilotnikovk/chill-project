<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | CHILI🌶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FA; }
        .gradient- Chili { background: linear-gradient(135deg, #1A1A1A 0%, #333333 100%); }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-16">
            <h1 class="text-4xl font-black tracking-tighter uppercase italic">ЧИЛЛ<span class="text-orange-600">.</span> <span class="text-xs text-neutral-400 align-top ml-2">ADMIN</span></h1>
            <div class="flex gap-4">
                <a href="index.html" target="_blank" class="px-6 py-3 border border-neutral-300 rounded-xl font-bold hover:bg-white transition-colors">Предпросмотр сайта</a>
                <button onclick="alert('Выход из системы')" class="px-6 py-3 bg-red-50 text-red-600 rounded-xl font-bold hover:bg-red-100 transition-colors">Выйти</button>
            </div>
        </header>

        <div class="grid lg:grid-cols-3 gap-8">
            <!-- Left: Sidebar Links -->
            <div class="space-y-4">
                <button class="w-full text-left p-6 bg-white rounded-3xl shadow-sm font-bold border-2 border-orange-500 text-orange-600 transition-all">Управление контентом</button>
                <button class="w-full text-left p-6 bg-white rounded-3xl shadow-sm font-bold text-neutral-400 hover:text-black transition-all">Заявки от клиентов (12)</button>
                <button class="w-full text-left p-6 bg-white rounded-3xl shadow-sm font-bold text-neutral-400 hover:text-black transition-all">Настройки чата (Help Scout)</button>
                <button class="w-full text-left p-6 bg-white rounded-3xl shadow-sm font-bold text-neutral-400 hover:text-black transition-all">SEO и Мета-теги</button>
            </div>

            <!-- Main: Editor -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Promo & Discounts -->
                <div class="bg-white rounded-3xl p-10 shadow-sm border border-neutral-100">
                    <h2 class="text-xl font-black mb-8 uppercase tracking-widest text-neutral-300">Промо-акции</h2>
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-neutral-400">Текст акции (Hero)</label>
                            <input type="text" value="Скидка 5% по промокоду" class="w-full px-6 py-4 rounded-xl bg-neutral-50 border-2 border-transparent focus:border-orange-500 outline-none transition-all font-bold" />
                        </div>
                    </div>
                </div>

                <!-- Collection Editor -->
                <div class="bg-white rounded-3xl p-10 shadow-sm border border-neutral-100">
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-xl font-black uppercase tracking-widest text-neutral-300">Коллекция 2026</h2>
                        <button onclick="addSofa()" class="bg-black text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-orange-600 transition-colors">+ Добавить</button>
                    </div>
                    
                    <div id="sofaList" class="space-y-6">
                        <!-- Dynamic items -->
                    </div>
                </div>

                <!-- Contacts Editor -->
                <div class="bg-white rounded-3xl p-10 shadow-sm border border-neutral-100">
                    <h2 class="text-xl font-black mb-10 uppercase tracking-widest text-neutral-300">Контакты и Филиал</h2>
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-neutral-400">Консультант (Username)</label>
                            <input type="text" value="@Tanya_Boyko18" class="w-full px-6 py-4 rounded-xl bg-neutral-50 border-2 border-transparent focus:border-orange-500 outline-none transition-all font-bold" />
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-neutral-400">Телефон</label>
                            <input type="text" value="8 933 567 7737" class="w-full px-6 py-4 rounded-xl bg-neutral-50 border-2 border-transparent focus:border-orange-500 outline-none transition-all font-bold" />
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sofas = [
            { id: 1, name: "MILANO LUXE", price: 185000, image: "https://images.unsplash.com/photo-1540574163026-643ea20ade25?w=400" },
            { id: 2, name: "TORINO SOFT", price: 142000, image: "https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?w=400" }
        ];

        function renderSofas() {
            const list = document.getElementById('sofaList');
            list.innerHTML = sofas.map(s => `
                <div class="flex items-center gap-6 p-6 border-2 border-neutral-50 rounded-2xl bg-white hover:border-orange-500/20 transition-all group">
                    <div class="w-20 h-20 rounded-xl bg-neutral-100 overflow-hidden shrink-0">
                        <img src="${s.image}" class="w-full h-full object-cover" />
                    </div>
                    <div class="flex-grow grid md:grid-cols-2 gap-4">
                        <input type="text" value="${s.name}" class="text-lg font-bold bg-transparent border-b border-neutral-100 focus:border-orange-500 outline-none w-full uppercase" />
                        <input type="number" value="${s.price}" class="text-neutral-500 font-bold bg-transparent border-b border-neutral-100 focus:border-orange-500 outline-none w-full" />
                    </div>
                    <button onclick="deleteSofa(${s.id})" class="p-3 text-neutral-300 hover:text-red-500 transition-colors">✕</button>
                </div>
            `).join('');
        }

        function deleteSofa(id) {
            if(confirm('Удалить эту модель?')) {
                sofas = sofas.filter(s => s.id !== id);
                renderSofas();
            }
        }

        function addSofa() {
            const name = prompt('Название модели:');
            if(name) {
                sofas.push({ id: Date.now(), name, price: 0, image: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400" });
                renderSofas();
            }
        }

        renderSofas();
    </script>
</body>
</html>
