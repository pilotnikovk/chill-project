<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | ЧИЛЛ.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FA; }
        .gradient-chili { background: linear-gradient(135deg, #1A1A1A 0%, #333333 100%); }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-16">
            <h1 class="text-4xl font-black tracking-tighter uppercase italic">ЧИЛЛ<span class="text-orange-600">.</span> <span class="text-xs text-neutral-400 align-top ml-2">ADMIN</span></h1>
            <div class="flex gap-4">
                <a href="index.html" target="_blank" class="px-6 py-3 border border-neutral-300 rounded-xl font-bold hover:bg-white transition-colors">Сайт</a>
                <button onclick="saveAll()" class="px-6 py-3 bg-orange-600 text-white rounded-xl font-bold hover:bg-orange-500 transition-colors">Сохранить всё</button>
            </div>
        </header>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="space-y-4">
                <button class="w-full text-left p-6 bg-white rounded-3xl shadow-sm font-bold border-2 border-orange-500 text-orange-600">Коллекция</button>
                <div class="p-6 bg-[#1A1A1A] text-white rounded-3xl shadow-sm">
                    <p class="text-xs text-gray-500 mb-4 font-bold uppercase tracking-widest">Совет</p>
                    <p class="text-sm font-medium">После изменений нажми «Сохранить всё», чтобы обновить сайт.</p>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white rounded-3xl p-10 shadow-sm border border-neutral-100">
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-xl font-black uppercase tracking-widest text-neutral-300">Редактирование моделей</h2>
                        <button onclick="addSofa()" class="bg-black text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-orange-600">+ Добавить</button>
                    </div>
                    <div id="sofaList" class="space-y-6"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let sofas = [];

        async function loadData() {
            try {
                const res = await fetch('api.php');
                sofas = await res.json();
                renderSofas();
            } catch (e) { console.error('Error loading data', e); }
        }

        function renderSofas() {
            const list = document.getElementById('sofaList');
            list.innerHTML = sofas.map((s, i) => `
                <div class="flex items-center gap-6 p-6 border-2 border-neutral-50 rounded-2xl bg-white hover:border-orange-500/20 transition-all group">
                    <div class="w-20 h-20 rounded-xl bg-neutral-100 overflow-hidden shrink-0">
                        <img src="${s.image}" class="w-full h-full object-cover" />
                    </div>
                    <div class="flex-grow grid md:grid-cols-2 gap-4">
                        <input type="text" value="${s.name}" onchange="updateSofa(${i}, 'name', this.value)" class="text-lg font-bold bg-transparent border-b border-neutral-100 focus:border-orange-500 outline-none w-full uppercase" />
                        <input type="text" value="${s.price}" onchange="updateSofa(${i}, 'price', this.value)" class="text-neutral-500 font-bold bg-transparent border-b border-neutral-100 focus:border-orange-500 outline-none w-full" />
                    </div>
                    <button onclick="deleteSofa(${i})" class="p-3 text-neutral-300 hover:text-red-500 transition-colors">✕</button>
                </div>
            `).join('');
        }

        function updateSofa(index, key, val) { sofas[index][key] = val; }

        async function saveAll() {
            const res = await fetch('api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(sofas)
            });
            if (res.ok) alert('Сайт успешно обновлен!');
            else alert('Ошибка при сохранении');
        }

        function deleteSofa(index) {
            if(confirm('Удалить модель?')) {
                sofas.splice(index, 1);
                renderSofas();
            }
        }

        function addSofa() {
            sofas.push({ id: Date.now(), name: "Новая модель", price: "0", image: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400" });
            renderSofas();
        }

        loadData();
    </script>
</body>
</html>
